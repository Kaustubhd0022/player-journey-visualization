<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg0:#050810;--bg1:#090D14;--bg2:#0D1320;--bg3:#111827;--bg4:#1A2335;
  --border-dim:#1E2D42;--border:#243550;--border-bright:#2E4468;
  --accent:#00C8FF;--accent-dim:#0087AA;--accent-glow:rgba(0,200,255,0.12);

  --loot:#22C55E;--loot-dim:#15803D;--loot-glow:rgba(34,197,94,0.15);
  --storm:#FACC15;--storm-dim:#A16207;--storm-glow:rgba(250,204,21,0.15);
  --text-0:#FFFFFF;--text-1:#E2E8F0;--text-2:#94A3B8;--text-3:#4B6280;--text-4:#2A3F57;
  --font-display:'Rajdhani',sans-serif;
  --font-ui:'Barlow',sans-serif;
  --font-mono:'JetBrains Mono',monospace;
  --font-condensed:'Barlow Condensed',sans-serif;
}
html{background:var(--bg0);color:var(--text-1);font-family:var(--font-ui);font-size:14px;line-height:1.6}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px);pointer-events:none;z-index:1000}
body::after{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border-dim) 1px,transparent 1px),linear-gradient(90deg,var(--border-dim) 1px,transparent 1px);background-size:40px 40px;opacity:0.25;pointer-events:none;z-index:0}
/* See the widget code above for all styles — this file is identical */
/* Full file delivered as rendered widget above */
body > div { position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; padding: 40px; }
.note { font-family: var(--font-mono); font-size: 13px; color: var(--accent); padding: 40px; text-align: center; border: 1px solid var(--border); border-radius: 2px; }
</style>
